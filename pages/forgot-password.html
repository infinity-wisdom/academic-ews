<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reset Password · Academic EWS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    theme: { extend: {
      colors:{"surface-container-lowest":"#ffffff","surface":"#fbf8fa","outline-variant":"#c5c6cd","outline":"#75777d","on-surface":"#1b1b1d","on-surface-variant":"#44474d","primary":"#091529","secondary":"#4355b9"},
      borderRadius:{"card":"12px"},spacing:{"padding-card":"24px","gutter":"24px"},
      fontFamily:{"body-md":["Inter"],"label-sm":["Inter"],"headline-h1":["Inter"],"caption-xs":["Inter"]},
      fontSize:{"headline-h1":["24px",{"lineHeight":"32px","fontWeight":"700"}],"body-md":["16px",{"lineHeight":"24px","fontWeight":"400"}],"label-sm":["14px",{"lineHeight":"20px","fontWeight":"500"}],"caption-xs":["12px",{"lineHeight":"16px","fontWeight":"400"}]},
      boxShadow:{"card":"0 2px 8px rgba(0,0,0,0.08)"}
    }}
  }
</script>
<style>.input-focus:focus{border-color:#0A58CA;box-shadow:0 0 0 4px rgba(10,88,202,0.1);}</style>
</head>
<body class="bg-surface min-h-screen flex items-center justify-center font-body-md text-on-surface">
<main class="w-full max-w-md px-gutter">
<div class="bg-surface-container-lowest rounded-card shadow-card p-padding-card">

  <div class="text-center mb-6">
    <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-primary mb-3">
      <span class="material-symbols-outlined text-white text-2xl" style="font-variation-settings:'FILL' 1;">lock_reset</span>
    </div>
    <h1 class="font-headline-h1 text-headline-h1 text-on-surface mb-1">Reset your password</h1>
    <p class="text-sm text-on-surface-variant">Enter your email and we'll send you a reset link.</p>
  </div>

  <div class="space-y-4" id="reset-form">
    <div>
      <label class="block font-label-sm text-label-sm text-on-surface mb-1" for="email">Email</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <span class="material-symbols-outlined text-outline text-xl">mail</span>
        </div>
        <input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg text-on-surface input-focus outline-none" id="email" placeholder="you@university.edu" type="email"/>
      </div>
    </div>

    <p class="hidden text-sm text-red-600" id="error-msg"></p>

    <button class="w-full py-2 px-4 rounded-lg font-label-sm text-label-sm text-white bg-primary hover:bg-primary/90 transition-colors disabled:opacity-60" id="reset-btn" type="button">
      Send Reset Link
    </button>
  </div>

  <div class="hidden bg-green-50 border border-green-200 rounded-lg px-4 py-4 text-sm text-green-800 text-center" id="success-msg">
    <p class="font-medium mb-1">Check your inbox!</p>
    <p>A password reset link has been sent to your email.</p>
  </div>

  <p class="mt-5 text-center font-caption-xs text-caption-xs text-outline">
    Remembered it? <a class="text-secondary hover:underline" href="login.html">Back to sign in</a>
  </p>
</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-client.js"></script>
<script>
  document.getElementById('reset-btn').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const errEl = document.getElementById('error-msg');
    errEl.classList.add('hidden');

    if (!email) { errEl.textContent = 'Please enter your email.'; errEl.classList.remove('hidden'); return; }

    const btn = document.getElementById('reset-btn');
    btn.disabled = true; btn.textContent = 'Sending…';

    const { error } = await window.supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/pages/update-password.html'
    });

    if (error) {
      errEl.textContent = error.message;
      errEl.classList.remove('hidden');
      btn.disabled = false; btn.textContent = 'Send Reset Link';
    } else {
      document.getElementById('reset-form').classList.add('hidden');
      document.getElementById('success-msg').classList.remove('hidden');
    }
  });
</script>
</body>
</html>
