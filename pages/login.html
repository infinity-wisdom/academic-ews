<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign In · Academic EWS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-lowest": "#ffffff",
                        "surface": "#fbf8fa",
                        "outline-variant": "#c5c6cd",
                        "outline": "#75777d",
                        "on-surface": "#1b1b1d",
                        "on-surface-variant": "#44474d",
                        "primary": "#091529",
                        "on-primary": "#ffffff",
                        "secondary": "#4355b9"
                    },
                    "borderRadius": {
                        "lg": "0.5rem",
                        "card": "12px"
                    },
                    "spacing": {
                        "padding-card": "24px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "headline-h1": ["Inter"],
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "caption-xs": ["Inter"]
                    },
                    "fontSize": {
                        "headline-h1": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-sm": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "caption-xs": ["12px", { "lineHeight": "16px", "fontWeight": "400" }]
                    },
                    "boxShadow": {
                        "card": "0 2px 8px rgba(0,0,0,0.08)"
                    }
                },
            },
        }
    </script>
<style>
        .input-focus:focus {
            border-color: #0A58CA;
            box-shadow: 0 0 0 4px rgba(10, 88, 202, 0.1);
        }
    </style>
</head>
<body class="bg-surface min-h-screen flex items-center justify-center font-body-md text-on-surface">
<main class="w-full max-w-md px-gutter">
<div class="bg-surface-container-lowest rounded-card shadow-card p-padding-card">
<!-- Header Section -->
<div class="text-center mb-8">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary mb-4">
<span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">shield</span>
</div>
<h1 class="font-headline-h1 text-headline-h1 text-on-surface mb-2">Academic EWS Portal</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to view your academic progress</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-5" method="POST" onsubmit="return false;">
<!-- Role Toggle -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-2">I am signing in as a</label>
<div class="grid grid-cols-2 gap-3" id="role-toggle">
<button class="role-option flex items-center justify-center gap-2 px-3 py-2 border-2 border-primary bg-primary text-white rounded-lg font-label-sm text-label-sm transition-colors" data-role="student" type="button">
<span class="material-symbols-outlined text-base">school</span>
<span>Student</span>
</button>
<button class="role-option flex items-center justify-center gap-2 px-3 py-2 border-2 border-outline-variant bg-white text-on-surface rounded-lg font-label-sm text-label-sm hover:border-primary/50 transition-colors" data-role="advisor" type="button">
<span class="material-symbols-outlined text-base">supervisor_account</span>
<span>Advisor</span>
</button>
</div>
<input id="selected-role" name="role" type="hidden" value="student"/>
</div>
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-1" for="email">Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">person</span>
</div>
<input autocomplete="email" class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder-on-surface-variant input-focus transition-all duration-200 outline-none" id="email" name="email" placeholder="you@university.edu" required="" type="email"/>
</div>
</div>
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-1" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-2 border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder-on-surface-variant input-focus transition-all duration-200 outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Show password" class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline" onclick="const p=document.getElementById('password'); p.type = p.type === 'password' ? 'text' : 'password'; return false;" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between mt-2">
<div class="flex items-center">
<input class="h-4 w-4 text-secondary border-outline-variant rounded outline-none focus:ring-2 focus:ring-secondary/20" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-label-sm text-label-sm text-on-surface-variant" for="remember-me">Remember me</label>
</div>
<div class="text-sm">
<a class="font-label-sm text-label-sm text-secondary hover:text-secondary/80" href="forgot-password.html">Forgot password?</a>
</div>
</div>
<div class="pt-2">
<button class="w-full flex justify-center py-2 px-4 border border-transparent rounded-lg shadow-sm font-label-sm text-label-sm text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-200" id="sign-in-btn" type="submit">
                        Sign In as Student
                    </button>
</div>
<p class="hidden text-center font-caption-xs text-caption-xs text-red-600" id="error-message"></p>
</form>
<div class="mt-6 text-center">
<p class="font-caption-xs text-caption-xs text-outline">
                    New student? <a class="text-secondary hover:underline" href="signup.html">Create an account</a>
                </p>
</div>
</div>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-client.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
    const roleButtons = document.querySelectorAll('.role-option');
    const roleInput = document.getElementById('selected-role');
    const signInBtn = document.getElementById('sign-in-btn');
    const errorMessage = document.getElementById('error-message');
    const DESTINATIONS = { student: 'student-dashboard.html', advisor: 'advisor-dashboard.html' };
    const LABELS = { student: 'Sign In as Student', advisor: 'Sign In as Advisor' };

    roleButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            roleButtons.forEach(b => {
                b.classList.remove('border-primary', 'bg-primary', 'text-white');
                b.classList.add('border-outline-variant', 'bg-white', 'text-on-surface');
            });
            btn.classList.remove('border-outline-variant', 'bg-white', 'text-on-surface');
            btn.classList.add('border-primary', 'bg-primary', 'text-white');
            const role = btn.getAttribute('data-role');
            roleInput.value = role;
            signInBtn.textContent = LABELS[role];
        });
    });

    function showError(message) {
        errorMessage.textContent = message;
        errorMessage.classList.remove('hidden');
    }

    signInBtn.addEventListener('click', async () => {
        errorMessage.classList.add('hidden');
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const expectedRole = roleInput.value;

        if (!email || !password) {
            showError('Please enter your email and password.');
            return;
        }

        signInBtn.disabled = true;
        signInBtn.textContent = 'Signing in…';

        const { data, error } = await window.supabaseClient.auth.signInWithPassword({ email, password });

        if (error) {
            showError(error.message);
            signInBtn.disabled = false;
            signInBtn.textContent = LABELS[expectedRole];
            return;
        }

        // Confirm this account's actual role matches what they selected.
        const { data: profile, error: profileError } = await window.supabaseClient
            .from('profiles')
            .select('role')
            .eq('id', data.user.id)
            .single();

        if (profileError || !profile) {
            showError('Could not load your profile. Please contact your administrator.');
            await window.supabaseClient.auth.signOut();
            signInBtn.disabled = false;
            signInBtn.textContent = LABELS[expectedRole];
            return;
        }

        if (profile.role !== expectedRole) {
            showError(`This account is registered as a${profile.role === 'admin' ? 'n' : ''} ${profile.role}. Please select the correct option above${profile.role === 'admin' ? ', or use the admin login page' : ''}.`);
            await window.supabaseClient.auth.signOut();
            signInBtn.disabled = false;
            signInBtn.textContent = LABELS[expectedRole];
            return;
        }

        window.location.href = DESTINATIONS[expectedRole];
    });
</script>
</body></html>
