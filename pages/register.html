<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Account · Academic EWS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    theme: { extend: {
      colors: { "surface-container-lowest":"#ffffff","surface":"#fbf8fa","outline-variant":"#c5c6cd","outline":"#75777d","on-surface":"#1b1b1d","on-surface-variant":"#44474d","primary":"#091529","secondary":"#4355b9" },
      borderRadius: { "card":"12px" },
      spacing: { "padding-card":"24px","gutter":"24px" },
      fontFamily: { "body-md":["Inter"],"label-sm":["Inter"],"headline-h1":["Inter"],"caption-xs":["Inter"] },
      fontSize: {
        "headline-h1":["24px",{"lineHeight":"32px","fontWeight":"700"}],
        "body-md":["16px",{"lineHeight":"24px","fontWeight":"400"}],
        "label-sm":["14px",{"lineHeight":"20px","fontWeight":"500"}],
        "caption-xs":["12px",{"lineHeight":"16px","fontWeight":"400"}]
      },
      boxShadow: { "card":"0 2px 8px rgba(0,0,0,0.08)" }
    }}
  }
</script>
<style>.input-focus:focus{border-color:#0A58CA;box-shadow:0 0 0 4px rgba(10,88,202,0.1);}</style>
</head>
<body class="bg-surface min-h-screen flex items-center justify-center font-body-md text-on-surface py-10">
<main class="w-full max-w-md px-gutter">
<div class="bg-surface-container-lowest rounded-card shadow-card p-padding-card">

  <!-- Header -->
  <div class="text-center mb-6">
    <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-primary mb-3">
      <span class="material-symbols-outlined text-white text-2xl" style="font-variation-settings:'FILL' 1;">school</span>
    </div>
    <h1 class="font-headline-h1 text-headline-h1 text-on-surface mb-1">Create Student Account</h1>
    <p class="font-body-md text-body-md text-on-surface-variant text-sm">Sign up to track your academic progress</p>
  </div>

  <!-- Form -->
  <form class="space-y-4" id="register-form" onsubmit="return false;">

    <!-- Full Name -->
    <div>
      <label class="block font-label-sm text-label-sm text-on-surface mb-1" for="full-name">Full Name</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <span class="material-symbols-outlined text-outline text-xl">badge</span>
        </div>
        <input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder-on-surface-variant input-focus outline-none" id="full-name" placeholder="Alex Reeves" required type="text"/>
      </div>
    </div>

    <!-- Student ID -->
    <div>
      <label class="block font-label-sm text-label-sm text-on-surface mb-1" for="student-id">Student ID</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <span class="material-symbols-outlined text-outline text-xl">tag</span>
        </div>
        <input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder-on-surface-variant input-focus outline-none" id="student-id" placeholder="e.g. STU-20240001" required type="text"/>
      </div>
    </div>

    <!-- Email -->
    <div>
      <label class="block font-label-sm text-label-sm text-on-surface mb-1" for="email">University Email</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <span class="material-symbols-outlined text-outline text-xl">mail</span>
        </div>
        <input autocomplete="email" class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder-on-surface-variant input-focus outline-none" id="email" placeholder="you@university.edu" required type="email"/>
      </div>
    </div>

    <!-- Password -->
    <div>
      <label class="block font-label-sm text-label-sm text-on-surface mb-1" for="password">Password</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <span class="material-symbols-outlined text-outline text-xl">lock</span>
        </div>
        <input autocomplete="new-password" class="block w-full pl-10 pr-10 py-2 border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder-on-surface-variant input-focus outline-none" id="password" placeholder="At least 8 characters" required type="password"/>
        <button aria-label="Show password" class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline" onclick="const p=document.getElementById('password');p.type=p.type==='password'?'text':'password';return false;" type="button">
          <span class="material-symbols-outlined text-xl">visibility</span>
        </button>
      </div>
    </div>

    <!-- Confirm Password -->
    <div>
      <label class="block font-label-sm text-label-sm text-on-surface mb-1" for="confirm-password">Confirm Password</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <span class="material-symbols-outlined text-outline text-xl">lock</span>
        </div>
        <input autocomplete="new-password" class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder-on-surface-variant input-focus outline-none" id="confirm-password" placeholder="Re-enter your password" required type="password"/>
      </div>
    </div>

    <!-- Error message -->
    <p class="hidden text-sm text-red-600 flex items-center gap-1" id="error-message">
      <span class="material-symbols-outlined text-base">error</span>
      <span id="error-text"></span>
    </p>

    <!-- Success message -->
    <div class="hidden bg-green-50 border border-green-200 rounded-lg px-3 py-3 text-sm text-green-800" id="success-message">
      <p class="font-medium mb-1">Account created! 🎉</p>
      <p>Check your email for a confirmation link, then <a class="underline font-medium" href="login.html">sign in here</a>.</p>
    </div>

    <!-- Submit -->
    <div class="pt-1">
      <button class="w-full flex justify-center items-center gap-2 py-2 px-4 rounded-lg font-label-sm text-label-sm text-white bg-primary hover:bg-primary/90 transition-colors disabled:opacity-60" id="register-btn" type="submit">
        Create Account
      </button>
    </div>
  </form>

  <p class="mt-5 text-center font-caption-xs text-caption-xs text-outline">
    Already have an account? <a class="text-secondary hover:underline font-medium" href="login.html">Sign in</a>
  </p>
</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-client.js"></script>
<script>
  const form = document.getElementById('register-form');
  const btn = document.getElementById('register-btn');
  const errorEl = document.getElementById('error-message');
  const errorText = document.getElementById('error-text');
  const successEl = document.getElementById('success-message');

  function showError(msg) {
    errorText.textContent = msg;
    errorEl.classList.remove('hidden');
    successEl.classList.add('hidden');
  }

  btn.addEventListener('click', async () => {
    errorEl.classList.add('hidden');

    const fullName  = document.getElementById('full-name').value.trim();
    const studentId = document.getElementById('student-id').value.trim();
    const email     = document.getElementById('email').value.trim();
    const password  = document.getElementById('password').value;
    const confirm   = document.getElementById('confirm-password').value;

    if (!fullName || !studentId || !email || !password || !confirm)
      return showError('Please fill in all fields.');
    if (password.length < 8)
      return showError('Password must be at least 8 characters.');
    if (password !== confirm)
      return showError('Passwords do not match.');

    btn.disabled = true;
    btn.textContent = 'Creating account…';

    const { data, error } = await window.supabaseClient.auth.signUp({
      email,
      password,
      options: {
        data: { full_name: fullName, student_id: studentId }
      }
    });

    if (error) {
      showError(error.message);
      btn.disabled = false;
      btn.textContent = 'Create Account';
      return;
    }

    // Also persist student_id in the profiles row
    // (the trigger creates the row; we update the extra fields)
    if (data.user) {
      await window.supabaseClient
        .from('profiles')
        .update({ student_id: studentId, full_name: fullName })
        .eq('id', data.user.id);
    }

    form.classList.add('hidden');
    successEl.classList.remove('hidden');
    btn.disabled = false;
  });
</script>
</body>
</html>
