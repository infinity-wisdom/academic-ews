<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Update Password · Academic EWS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    theme: { extend: {
      colors:{"surface-container-lowest":"#ffffff","surface":"#fbf8fa","outline-variant":"#c5c6cd","outline":"#75777d","on-surface":"#1b1b1d","on-surface-variant":"#44474d","primary":"#091529","secondary":"#4355b9"},
      borderRadius:{"card":"12px"},spacing:{"padding-card":"24px","gutter":"24px"},
      fontFamily:{"body-md":["Inter"],"label-sm":["Inter"],"headline-h1":["Inter"],"caption-xs":["Inter"]},
      fontSize:{"headline-h1":["24px",{"lineHeight":"32px","fontWeight":"700"}],"body-md":["16px",{"lineHeight":"24px","fontWeight":"400"}],"label-sm":["14px",{"lineHeight":"20px","fontWeight":"500"}],"caption-xs":["12px",{"lineHeight":"16px","fontWeight":"400"}]},
      boxShadow:{"card":"0 2px 8px rgba(0,0,0,0.08)"}
    }}
  }
</script>
<style>.input-focus:focus{border-color:#0A58CA;box-shadow:0 0 0 4px rgba(10,88,202,0.1);}</style>
</head>
<body class="bg-surface min-h-screen flex items-center justify-center font-body-md text-on-surface">
<main class="w-full max-w-md px-gutter">
<div class="bg-surface-container-lowest rounded-card shadow-card p-padding-card">
  <div class="text-center mb-6">
    <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-primary mb-3">
      <span class="material-symbols-outlined text-white text-2xl" style="font-variation-settings:'FILL' 1;">lock</span>
    </div>
    <h1 class="font-headline-h1 text-headline-h1 text-on-surface mb-1">Set new password</h1>
    <p class="text-sm text-on-surface-variant">Choose a strong new password for your account.</p>
  </div>

  <div class="space-y-4">
    <div>
      <label class="block font-label-sm text-label-sm text-on-surface mb-1" for="password">New Password</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <span class="material-symbols-outlined text-outline text-xl">lock</span>
        </div>
        <input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg input-focus outline-none" id="password" placeholder="At least 8 characters" type="password"/>
      </div>
    </div>
    <div>
      <label class="block font-label-sm text-label-sm text-on-surface mb-1" for="confirm">Confirm Password</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <span class="material-symbols-outlined text-outline text-xl">lock</span>
        </div>
        <input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg input-focus outline-none" id="confirm" placeholder="Re-enter password" type="password"/>
      </div>
    </div>
    <p class="hidden text-sm text-red-600" id="error-msg"></p>
    <button class="w-full py-2 px-4 rounded-lg font-label-sm text-label-sm text-white bg-primary hover:bg-primary/90 disabled:opacity-60" id="update-btn" type="button">
      Update Password
    </button>
  </div>
</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-client.js"></script>
<script>
  // Supabase puts the recovery token in the URL hash — this handles it
  window.supabaseClient.auth.onAuthStateChange(async (event) => {
    if (event !== 'PASSWORD_RECOVERY') return;
  });

  document.getElementById('update-btn').addEventListener('click', async () => {
    const pw = document.getElementById('password').value;
    const cf = document.getElementById('confirm').value;
    const err = document.getElementById('error-msg');
    err.classList.add('hidden');

    if (pw.length < 8) { err.textContent = 'Password must be at least 8 characters.'; err.classList.remove('hidden'); return; }
    if (pw !== cf) { err.textContent = 'Passwords do not match.'; err.classList.remove('hidden'); return; }

    const btn = document.getElementById('update-btn');
    btn.disabled = true; btn.textContent = 'Updating…';

    const { error } = await window.supabaseClient.auth.updateUser({ password: pw });
    if (error) {
      err.textContent = error.message; err.classList.remove('hidden');
      btn.disabled = false; btn.textContent = 'Update Password';
    } else {
      await window.supabaseClient.auth.signOut();
      window.location.href = 'login.html?updated=1';
    }
  });
</script>
</body>
</html>
